version: 2
updates:
  - package-ecosystem: "gomod"
    directories:
    - "/l4proxy"
    - "/cmd/l4proxy"
    - "/cmd/service-announcer"
    - "/"
    schedule:
      interval: "weekly"
  cooldown:
    default-days: 7
    groups:
      go-deps:
        patterns:
        - '*'
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
  cooldown:
    default-days: 7
    groups:
      actions-deps:
        patterns:
        - '*'
